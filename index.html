<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C0392B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Servi Reembolso">
<title>Servi Brasil - Reembolso</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Servi Brasil Reembolso%22,%22short_name%22:%22Reembolso%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22theme_color%22:%22%23C0392B%22,%22background_color%22:%22%23fff%22}">
<style>
:root {
  --vermelho: #C0392B;
  --vermelho-escuro: #96281B;
  --bg: #f5f5f5;
  --card: #ffffff;
  --texto: #1a1a1a;
  --texto2: #555;
  --borda: #e0e0e0;
  --input-bg: #fff;
  --input-texto: #1a1a1a;
  --label: #333;
  --pendente: #f39c12;
  --aprovado-rosimar: #3498db;
  --aprovado-dario: #27ae60;
  --rejeitado: #e74c3c;
  --sombra: 0 2px 12px rgba(0,0,0,0.08);
}
body.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --texto: #f0f0f0;
  --texto2: #aaa;
  --borda: #333;
  --input-bg: #2a2a2a;
  --input-texto: #f0f0f0;
  --label: #ccc;
  --sombra: 0 2px 12px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; transition: background .3s, color .3s; }
.header {
  background: var(--vermelho);
  color: white;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header img { height: 36px; border-radius: 4px; }
.header h1 { font-size: 16px; font-weight: 700; line-height: 1.2; }
.header-right { display: flex; align-items: center; gap: 8px; }
.btn-tema { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 10px; border-radius: 20px; cursor: pointer; font-size: 14px; }
.btn-logout { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
.perfil-badge { background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
.card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: var(--sombra); border: 1px solid var(--borda); }
/* LOGIN */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--bg); }
.login-box { background: var(--card); border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 400px; box-shadow: var(--sombra); border: 1px solid var(--borda); }
.login-logo { text-align: center; margin-bottom: 24px; }
.login-logo img { height: 60px; border-radius: 8px; }
.login-logo h2 { margin-top: 12px; font-size: 20px; color: var(--vermelho); }
.login-logo p { color: var(--texto2); font-size: 13px; margin-top: 4px; }
/* FORM FIELDS */
label { display: block; font-size: 13px; font-weight: 600; color: var(--label); margin-bottom: 4px; }
input, select, textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--borda);
  border-radius: 8px;
  font-size: 15px;
  background: var(--input-bg);
  color: var(--input-texto);
  margin-bottom: 14px;
  transition: border .2s;
  -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--vermelho); }
input[readonly] { background: #f0f0f0; color: #888; }
body.dark input[readonly] { background: #2a2a2a; color: #666; }
textarea { resize: vertical; min-height: 80px; }
/* BOTOES */
.btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity .2s, transform .1s; }
.btn:active { transform: scale(0.98); }
.btn-vermelho { background: var(--vermelho); color: white; }
.btn-vermelho:hover { background: var(--vermelho-escuro); }
.btn-verde { background: #27ae60; color: white; }
.btn-vermelho-outline { background: transparent; color: var(--vermelho); border: 2px solid var(--vermelho); }
.btn-cinza { background: #e0e0e0; color: #333; }
.btn-sm { padding: 7px 14px; font-size: 13px; width: auto; border-radius: 6px; }
.btn-azul { background: #3498db; color: white; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }
/* STATUS */
.status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; }
.status-Pendente { background: var(--pendente); }
.status-Aprovado-Rosimar { background: var(--aprovado-rosimar); }
.status-Aprovado-Dario { background: var(--aprovado-dario); }
.status-Rejeitado { background: var(--rejeitado); }
/* CARDS DE SOLICITACAO */
.sol-card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: var(--sombra); border: 1px solid var(--borda); cursor: pointer; transition: transform .15s; }
.sol-card:hover { transform: translateY(-2px); }
.sol-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.sol-id { font-weight: 700; font-size: 14px; color: var(--vermelho); }
.sol-nome { font-size: 13px; color: var(--texto2); margin-bottom: 4px; }
.sol-valor { font-size: 18px; font-weight: 700; color: var(--texto); }
.sol-data { font-size: 12px; color: var(--texto2); }
/* NF CARD */
.nf-card { background: var(--bg); border-radius: 8px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--borda); }
.nf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.nf-cat { font-weight: 600; font-size: 13px; color: var(--vermelho); }
.nf-valor { font-weight: 700; font-size: 15px; }
.nf-campos { display: grid; gap: 8px; }
.nf-campo label { font-size: 12px; margin-bottom: 2px; }
/* ANEXOS */
.anexos-lista { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.anexo-item { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--borda); border-radius: 6px; padding: 8px 10px; }
.anexo-nome { font-size: 12px; color: var(--texto2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.anexo-btns { display: flex; gap: 6px; }
.btn-anexo-upload { display: flex; gap: 8px; margin-top: 6px; }
.btn-upload { padding: 8px 14px; border: 1.5px dashed var(--borda); background: transparent; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--texto2); flex: 1; text-align: center; }
.btn-upload:hover { border-color: var(--vermelho); color: var(--vermelho); }
input[type="file"] { display: none; }
/* TOTAL */
.total-box { background: var(--vermelho); color: white; border-radius: 10px; padding: 14px 18px; text-align: center; margin: 16px 0; }
.total-box .label { font-size: 12px; opacity: 0.85; }
.total-box .valor { font-size: 28px; font-weight: 800; }
/* COMENTARIO */
.comentario-box { background: var(--bg); border-left: 4px solid var(--pendente); border-radius: 6px; padding: 12px 14px; margin: 10px 0; }
.comentario-box.aprovado { border-color: var(--aprovado-dario); }
.comentario-box.rejeitado { border-color: var(--rejeitado); }
/* UTIL */
.mt8 { margin-top: 8px; }
.mt16 { margin-top: 16px; }
.mb8 { margin-bottom: 8px; }
.sec-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--texto); }
.aviso { background: #fff3cd; color: #856404; border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px; border: 1px solid #ffc107; }
body.dark .aviso { background: #332a00; color: #ffc107; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.ios-banner { position: fixed; bottom: 20px; left: 16px; right: 16px; background: var(--card); border-radius: 14px; padding: 14px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 999; border: 1px solid var(--borda); }
.ios-banner .close { position: absolute; top: 10px; right: 12px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--texto2); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const API = "https://script.google.com/macros/s/AKfycbzTj8GuPh1q-BWrZjeI572Uc9Ab6fRLCEFF3cRtwRQ7jvSDTaDcy5plPLeur8nd0-lk/exec";
const LOGO = "https://i.imgur.com/WtkBjp9.png";

let estado = {
  tela: "login",
  usuario: null,
  solicitacoes: [],
  solAtual: null,
  carregando: false,
  tema: localStorage.getItem("tema") || "claro"
};

if (estado.tema === "escuro") document.body.classList.add("dark");

async function api(payload) {
  const r = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  });
  return r.json();
}

function fmtData(d) {
  if (!d) return "";
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString("pt-BR");
}

function fmtMoeda(v) {
  return "R$ " + parseFloat(v || 0).toFixed(2).replace(".", ",");
}

function statusClass(s) {
  return "status status-" + (s || "").replace(/ /g, "-");
}

// Compressão de imagem
function comprimirImagem(file) {
  return new Promise((resolve) => {
    if (file.type === "application/pdf") {
      const reader = new FileReader();
      reader.onload = e => resolve({ b64: e.target.result, nome: file.name, tipo: "pdf" });
      reader.readAsDataURL(file);
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        const MAX = 1200;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL("image/jpeg", 0.7);
        resolve({ b64, nome: file.name, tipo: "imagem" });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ============ RENDER ============
function render() {
  const app = document.getElementById("app");
  if (estado.tela === "login") app.innerHTML = telaLogin();
  else if (estado.tela === "criarSenha") app.innerHTML = telaCriarSenha();
  else if (estado.tela === "lista") app.innerHTML = telaLista();
  else if (estado.tela === "detalhe") app.innerHTML = telaDetalhe();
  else if (estado.tela === "nova") app.innerHTML = telaNova();
  bindEvents();
}

function header(titulo) {
  return `
  <div class="header">
    <div class="header-left">
      <img src="${LOGO}" alt="Logo" onerror="this.style.display='none'">
      <div>
        <h1>Servi Brasil</h1>
        <div style="font-size:11px;opacity:.8">${titulo}</div>
      </div>
    </div>
    <div class="header-right">
      <span class="perfil-badge">${estado.usuario?.perfil || ""}</span>
      <button class="btn-tema" onclick="toggleTema()">${estado.tema === "escuro" ? "☀️" : "🌙"}</button>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>`;
}

function telaLogin() {
  return `
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <img src="${LOGO}" alt="Logo">
        <h2>Servi Brasil</h2>
        <p>Sistema de Reembolso</p>
      </div>
      <label>Email corporativo</label>
      <input type="email" id="inp-email" placeholder="seu@email.com" autocomplete="email">
      <label>Senha</label>
      <input type="password" id="inp-senha" placeholder="Sua senha" autocomplete="current-password">
      <button class="btn btn-vermelho" id="btn-login">Entrar</button>
      <p id="login-erro" style="color:var(--rejeitado);font-size:13px;margin-top:10px;text-align:center;display:none"></p>
    </div>
  </div>`;
}

function telaCriarSenha() {
  return `
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <img src="${LOGO}" alt="Logo">
        <h2>Criar senha</h2>
        <p>Primeiro acesso — crie sua senha</p>
      </div>
      <label>Nova senha</label>
      <input type="password" id="inp-nova-senha" placeholder="Mínimo 6 caracteres">
      <label>Confirmar senha</label>
      <input type="password" id="inp-conf-senha" placeholder="Repita a senha">
      <button class="btn btn-vermelho" id="btn-criar-senha">Criar senha e entrar</button>
      <p id="senha-erro" style="color:var(--rejeitado);font-size:13px;margin-top:10px;text-align:center;display:none"></p>
    </div>
  </div>`;
}

function telaLista() {
  const u = estado.usuario;
  const sols = estado.solicitacoes;
  let avisoHtml = "";
  if (u.perfil === "Rosimar") avisoHtml = `<div class="aviso">📋 Solicitacoes pendentes aguardam sua revisao.</div>`;
  if (u.perfil === "Dario") avisoHtml = `<div class="aviso">✅ Solicitacoes aprovadas por Rosimar aguardam sua aprovacao final.</div>`;

  const solsHtml = sols.length === 0
    ? `<div style="text-align:center;color:var(--texto2);padding:40px 0">Nenhuma solicitacao encontrada</div>`
    : sols.map((s, i) => `
      <div class="sol-card" onclick="verDetalhe(${i})">
        <div class="sol-header">
          <div>
            <div class="sol-id">${s.ID_Solicitacao}</div>
            <div class="sol-nome">${s.Nome_Colaborador}</div>
          </div>
          <span class="${statusClass(s.Status)}">${s.Status}</span>
        </div>
        <div class="sol-valor">${fmtMoeda(s.Valor_Total)}</div>
        <div class="sol-data">${fmtData(s.Data_Envio)}</div>
      </div>`).join("");

  return `
  ${header("Minhas Solicitacoes")}
  <div class="container">
    ${avisoHtml}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span class="sec-title" style="margin:0">Solicitacoes</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-cinza btn-sm" onclick="carregarLista()">↻ Atualizar</button>
        ${u.perfil === "Prestador" ? `<button class="btn btn-vermelho btn-sm" onclick="irNova()">+ Nova</button>` : ""}
      </div>
    </div>
    ${solsHtml}
  </div>`;
}

function telaDetalhe() {
  const s = estado.solAtual;
  if (!s) return telaLista();
  const u = estado.usuario;
  const notas = s.notas || [];

  const nfsHtml = notas.map((nf, i) => {
    const links = (nf.Anexo_NF || "").split("|").filter(l => l.trim());
    const anexosHtml = links.length > 0
      ? links.map((link, j) => `
        <div class="anexo-item">
          <span class="anexo-nome">Anexo ${j+1}</span>
          <div class="anexo-btns">
            <a href="${link}" target="_blank" class="btn btn-azul btn-sm">👁 Ver</a>
            <a href="${link.replace('export=view','export=download')}" target="_blank" class="btn btn-cinza btn-sm">⬇ Baixar</a>
          </div>
        </div>`).join("")
      : `<div style="color:var(--texto2);font-size:12px">Sem anexo</div>`;

    return `
    <div class="nf-card">
      <div class="nf-header">
        <span class="nf-cat">${nf.Categoria || nf.categoria || "NF"} ${i+1}</span>
        <span class="nf-valor">${fmtMoeda(nf.Valor_NF)}</span>
      </div>
      <div style="font-size:12px;color:var(--texto2);margin-bottom:6px">${fmtData(nf.Data_NF)} — ${nf.Descricao_NF || ""}</div>
      <div class="anexos-lista">${anexosHtml}</div>
    </div>`;
  }).join("");

  const coments = [];
  if (s.Comentario_Gestor) coments.push(`<div class="comentario-box"><strong>Rosimar:</strong> ${s.Comentario_Gestor}</div>`);
  if (s.Comentario_RH) coments.push(`<div class="comentario-box aprovado"><strong>Dario:</strong> ${s.Comentario_RH}</div>`);

  let acoesHtml = "";
  if (u.perfil === "Rosimar" && s.Status === "Pendente") {
    acoesHtml = `
    <div class="card">
      <label>Comentario (opcional)</label>
      <textarea id="coment" placeholder="Adicione um comentario..."></textarea>
      <div class="btn-row">
        <button class="btn btn-verde" onclick="aprovarRosimar()">✓ Aprovar</button>
        <button class="btn btn-vermelho-outline" onclick="rejeitarRosimar()">✗ Rejeitar</button>
      </div>
    </div>`;
  }
  if (u.perfil === "Dario" && s.Status === "Aprovado Rosimar") {
    acoesHtml = `
    <div class="card">
      <label>Comentario (opcional)</label>
      <textarea id="coment" placeholder="Adicione um comentario..."></textarea>
      <div class="btn-row">
        <button class="btn btn-verde" onclick="aprovarDario()">✓ Aprovacao Final</button>
        <button class="btn btn-vermelho-outline" onclick="rejeitarDario()">✗ Rejeitar</button>
      </div>
    </div>`;
  }

  return `
  ${header("Detalhe")}
  <div class="container">
    <button class="btn btn-cinza btn-sm mb8" onclick="voltar()">← Voltar</button>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-size:18px;font-weight:800;color:var(--vermelho)">${s.ID_Solicitacao}</div>
          <div style="font-size:14px;color:var(--texto2)">${s.Nome_Colaborador}</div>
        </div>
        <span class="${statusClass(s.Status)}">${s.Status}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:12px">
        <div><span style="color:var(--texto2)">Banco:</span> ${s.Banco || "—"}</div>
        <div><span style="color:var(--texto2)">Pix:</span> ${s.Chave_Pix || "—"}</div>
        <div><span style="color:var(--texto2)">Periodo:</span> ${fmtData(s.Periodo_Inicio)} - ${fmtData(s.Periodo_Fim)}</div>
        <div><span style="color:var(--texto2)">Enviado:</span> ${fmtData(s.Data_Envio)}</div>
      </div>
      ${s.Descricao_Reembolso ? `<div style="font-size:13px;margin-bottom:8px"><span style="color:var(--texto2)">Descricao:</span> ${s.Descricao_Reembolso}</div>` : ""}
      <div class="total-box"><div class="label">Total</div><div class="valor">${fmtMoeda(s.Valor_Total)}</div></div>
    </div>
    <div class="sec-title">Notas Fiscais</div>
    ${nfsHtml}
    ${coments.join("")}
    ${acoesHtml}
  </div>`;
}

// ======= NOVA SOLICITACAO =======
let nfsAtivas = [];
let nfIdxAtual = 0;

function telaNova() {
  if (nfsAtivas.length === 0) nfsAtivas = [novaNF()];
  return `
  ${header("Nova Solicitacao")}
  <div class="container">
    <button class="btn btn-cinza btn-sm mb8" onclick="voltar()">← Voltar</button>
    <div class="card">
      <div class="sec-title">Dados do Prestador</div>
      <label>Nome completo</label>
      <input type="text" id="nome" placeholder="Seu nome">
      <label>Email</label>
      <input type="email" id="email" value="${estado.usuario?.email || ""}" readonly>
      <label>Departamento</label>
      <input type="text" id="depto" value="${estado.usuario?.depto || ""}" placeholder="Departamento">
      <label>Banco</label>
      <input type="text" id="banco" placeholder="Ex: Nubank, Itau...">
      <label>Chave Pix</label>
      <input type="text" id="pix" placeholder="CPF, email ou telefone">
      <label>Periodo inicio</label>
      <input type="date" id="periodoInicio">
      <label>Periodo fim</label>
      <input type="date" id="periodoFim">
      <label>Descricao geral</label>
      <textarea id="descricao" placeholder="Descreva o motivo do reembolso"></textarea>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="sec-title" style="margin:0">Notas Fiscais</span>
      <button class="btn btn-vermelho btn-sm" onclick="adicionarNF()">+ Adicionar NF</button>
    </div>
    <div id="nfs-container"></div>
    <div class="total-box" id="total-box"><div class="label">Total das NFs</div><div class="valor" id="total-val">R$ 0,00</div></div>
    <button class="btn btn-vermelho" id="btn-enviar" onclick="enviarSolicitacao()">Enviar Solicitacao</button>
  </div>`;
}

function novaNF() {
  return { cat: "", data: "", valor: "", km: "", descricao: "", tipoOutro: "", anexos: [] };
}

function adicionarNF() {
  nfsAtivas.push(novaNF());
  renderNFs();
  calcTotal();
}

function removerNF(i) {
  nfsAtivas.splice(i, 1);
  if (nfsAtivas.length === 0) nfsAtivas = [novaNF()];
  renderNFs();
  calcTotal();
}

function renderNFs() {
  const cont = document.getElementById("nfs-container");
  if (!cont) return;
  cont.innerHTML = nfsAtivas.map((nf, i) => renderNFCard(nf, i)).join("");
  // Re-bind
  nfsAtivas.forEach((nf, i) => {
    const catSel = document.getElementById(`cat-${i}`);
    if (catSel) catSel.value = nf.cat || "";
    atualizarCamposNF(i);
  });
}

function renderNFCard(nf, i) {
  return `
  <div class="nf-card" id="nf-card-${i}">
    <div class="nf-header">
      <span class="nf-cat">NF ${i+1}</span>
      <button class="btn btn-cinza btn-sm" onclick="removerNF(${i})">Remover</button>
    </div>
    <label>Categoria</label>
    <select id="cat-${i}" onchange="onCatChange(${i})">
      <option value="">Selecione...</option>
      <option value="Alimentacao">Alimentacao</option>
      <option value="Transporte">Transporte</option>
      <option value="Hospedagem">Hospedagem</option>
      <option value="Combustivel">Combustivel</option>
      <option value="Material de escritorio">Material de escritorio</option>
      <option value="Outro">Outro</option>
    </select>
    <div id="campos-${i}"></div>
    <div id="anexos-area-${i}">
      <div class="btn-anexo-upload">
        <button type="button" class="btn-upload" onclick="abrirCamera(${i})">📷 Camera</button>
        <button type="button" class="btn-upload" onclick="abrirGaleria(${i})">🖼 Galeria/PDF</button>
      </div>
      <input type="file" id="file-camera-${i}" accept="image/*" capture="environment" onchange="aoAnexar(${i}, this)">
      <input type="file" id="file-galeria-${i}" accept="image/*,application/pdf" multiple onchange="aoAnexar(${i}, this)">
      <div class="anexos-lista" id="anexos-lista-${i}"></div>
    </div>
  </div>`;
}

function onCatChange(i) {
  const sel = document.getElementById(`cat-${i}`);
  nfsAtivas[i].cat = sel ? sel.value : "";
  atualizarCamposNF(i);
  calcTotal();
}

function atualizarCamposNF(i) {
  const cont = document.getElementById(`campos-${i}`);
  if (!cont) return;
  const cat = nfsAtivas[i].cat;
  let html = "";
  if (!cat) { cont.innerHTML = ""; return; }

  html += `<label>Data da NF</label><input type="date" id="data-${i}" onchange="nfsAtivas[${i}].data=this.value">`;

  if (cat === "Combustivel") {
    html += `
    <label>KM percorridos</label>
    <input type="number" id="km-${i}" placeholder="Ex: 120" oninput="calcKm(${i})">
    <div id="val-km-${i}" style="font-size:13px;color:var(--vermelho);margin-bottom:8px"></div>`;
  } else {
    html += `<label>Valor (R$)</label><input type="number" id="val-${i}" placeholder="0,00" step="0.01" oninput="nfsAtivas[${i}].valor=parseFloat(this.value)||0;calcTotal()">`;
  }

  if (cat === "Outro") {
    html += `<label>Tipo de despesa</label><input type="text" id="tipo-${i}" placeholder="Descreva o tipo" onchange="nfsAtivas[${i}].tipoOutro=this.value">`;
  }

  html += `<label>Descricao</label><input type="text" id="desc-${i}" placeholder="Descricao da NF" onchange="nfsAtivas[${i}].descricao=this.value">`;
  cont.innerHTML = html;

  if (nfsAtivas[i].data) {
    const el = document.getElementById(`data-${i}`);
    if (el) el.value = nfsAtivas[i].data;
  }
}

function calcKm(i) {
  const kmEl = document.getElementById(`km-${i}`);
  const km = parseFloat(kmEl ? kmEl.value : 0) || 0;
  const valor = km * 0.96;
  nfsAtivas[i].km = km;
  nfsAtivas[i].valor = valor;
  const box = document.getElementById(`val-km-${i}`);
  if (box) box.textContent = km > 0 ? `${km} km x R$ 0,96 = R$ ${valor.toFixed(2).replace(".", ",")}` : "";
  calcTotal();
}

function calcTotal() {
  const total = nfsAtivas.reduce((s, nf) => s + (parseFloat(nf.valor) || 0), 0);
  const el = document.getElementById("total-val");
  if (el) el.textContent = fmtMoeda(total);
}

function abrirCamera(i) { document.getElementById(`file-camera-${i}`)?.click(); }
function abrirGaleria(i) { document.getElementById(`file-galeria-${i}`)?.click(); }

async function aoAnexar(i, input) {
  const files = Array.from(input.files || []);
  for (const file of files) {
    const dado = await comprimirImagem(file);
    nfsAtivas[i].anexos.push(dado);
  }
  renderAnexos(i);
  input.value = "";
}

function renderAnexos(i) {
  const lista = document.getElementById(`anexos-lista-${i}`);
  if (!lista) return;
  lista.innerHTML = nfsAtivas[i].anexos.map((a, j) => `
    <div class="anexo-item">
      <span class="anexo-nome">✓ ${a.nome}</span>
      <button class="btn btn-cinza btn-sm" onclick="removerAnexo(${i},${j})">✕</button>
    </div>`).join("");
}

function removerAnexo(i, j) {
  nfsAtivas[i].anexos.splice(j, 1);
  renderAnexos(i);
}

// ======= ENVIO =======
async function enviarSolicitacao() {
  const nome = document.getElementById("nome")?.value?.trim();
  const depto = document.getElementById("depto")?.value?.trim();
  const banco = document.getElementById("banco")?.value?.trim();
  const pix = document.getElementById("pix")?.value?.trim();
  const periodoInicio = document.getElementById("periodoInicio")?.value;
  const periodoFim = document.getElementById("periodoFim")?.value;
  const descricao = document.getElementById("descricao")?.value?.trim();

  if (!nome) { alert("Preencha o nome."); return; }

  // Coletar NFs
  const notas = [];
  for (let i = 0; i < nfsAtivas.length; i++) {
    const nf = nfsAtivas[i];
    const catEl = document.getElementById(`cat-${i}`);
    const dataEl = document.getElementById(`data-${i}`);
    const valEl = document.getElementById(`val-${i}`);
    const descEl = document.getElementById(`desc-${i}`);
    const tipoEl = document.getElementById(`tipo-${i}`);

    if (catEl) nf.cat = catEl.value;
    if (dataEl) nf.data = dataEl.value;
    if (valEl && nf.cat !== "Combustivel") nf.valor = parseFloat(valEl.value) || 0;
    if (descEl) nf.descricao = descEl.value;
    if (tipoEl) nf.tipoOutro = tipoEl.value;

    notas.push({
      cat: nf.cat,
      data: nf.data,
      valor: nf.valor || 0,
      km: nf.km || "",
      descricao: nf.descricao || "",
      tipoOutro: nf.tipoOutro || "",
      anexos: nf.anexos.map(a => ({ b64: a.b64, nome: a.nome }))
    });
  }

  const total = notas.reduce((s, n) => s + (parseFloat(n.valor) || 0), 0);

  const btn = document.getElementById("btn-enviar");
  if (btn) btn.innerHTML = `<span class="spinner"></span>Enviando...`;

  try {
    const res = await api({
      type: "solicitacao",
      nome,
      email: estado.usuario.email,
      depto,
      banco,
      chavePix: pix,
      periodoInicio,
      periodoFim,
      descricao,
      total,
      notas
    });

    if (res.ok) {
      alert("Solicitacao enviada com sucesso! ID: " + res.id);
      nfsAtivas = [novaNF()];
      await carregarLista();
      estado.tela = "lista";
      render();
    } else {
      alert("Erro: " + (res.msg || "Tente novamente"));
      if (btn) btn.innerHTML = "Enviar Solicitacao";
    }
  } catch (err) {
    alert("Erro de conexao. Verifique sua internet.");
    if (btn) btn.innerHTML = "Enviar Solicitacao";
  }
}

// ======= NAV =======
function verDetalhe(i) {
  estado.solAtual = estado.solicitacoes[i];
  estado.tela = "detalhe";
  render();
}

function irNova() {
  nfsAtivas = [novaNF()];
  estado.tela = "nova";
  render();
  setTimeout(() => { renderNFs(); calcTotal(); }, 100);
}

function voltar() {
  estado.tela = "lista";
  render();
}

async function carregarLista() {
  const res = await api({ type: "listar", email: estado.usuario.email, perfil: estado.usuario.perfil });
  estado.solicitacoes = (res.solicitacoes || []).reverse();
}

function toggleTema() {
  estado.tema = estado.tema === "escuro" ? "claro" : "escuro";
  localStorage.setItem("tema", estado.tema);
  document.body.classList.toggle("dark", estado.tema === "escuro");
  render();
}

function logout() {
  estado.usuario = null;
  estado.solicitacoes = [];
  estado.tela = "login";
  render();
}

// ======= BIND EVENTS =======
function bindEvents() {
  const btnLogin = document.getElementById("btn-login");
  if (btnLogin) {
    btnLogin.addEventListener("click", async () => {
      const email = document.getElementById("inp-email")?.value?.trim();
      const senha = document.getElementById("inp-senha")?.value?.trim();
      const erro = document.getElementById("login-erro");
      if (!email) { if(erro){erro.textContent="Informe o email.";erro.style.display="block";} return; }
      btnLogin.innerHTML = `<span class="spinner"></span>Entrando...`;
      try {
        const res = await api({ type: "login", email, senha });
        if (res.primeiroAcesso) {
          estado._emailTemp = email;
          estado.tela = "criarSenha";
          render();
        } else if (res.ok) {
          estado.usuario = { nome: res.nome, perfil: res.perfil, email, depto: res.depto };
          await carregarLista();
          estado.tela = "lista";
          render();
          mostrarBannerPWA();
        } else {
          if(erro){erro.textContent = res.msg || "Email ou senha incorretos.";erro.style.display="block";}
          btnLogin.innerHTML = "Entrar";
        }
      } catch(e) {
        if(erro){erro.textContent="Erro de conexao.";erro.style.display="block";}
        btnLogin.innerHTML = "Entrar";
      }
    });
  }

  const btnCriarSenha = document.getElementById("btn-criar-senha");
  if (btnCriarSenha) {
    btnCriarSenha.addEventListener("click", async () => {
      const nova = document.getElementById("inp-nova-senha")?.value?.trim();
      const conf = document.getElementById("inp-conf-senha")?.value?.trim();
      const erro = document.getElementById("senha-erro");
      if (!nova || nova.length < 6) { if(erro){erro.textContent="Senha deve ter ao menos 6 caracteres.";erro.style.display="block";} return; }
      if (nova !== conf) { if(erro){erro.textContent="Senhas nao conferem.";erro.style.display="block";} return; }
      btnCriarSenha.innerHTML = `<span class="spinner"></span>Salvando...`;
      const res = await api({ type: "criarSenha", email: estado._emailTemp, senha: nova });
      if (res.ok) {
        estado.usuario = { nome: res.nome, perfil: res.perfil, email: estado._emailTemp, depto: res.depto };
        await carregarLista();
        estado.tela = "lista";
        render();
      } else {
        if(erro){erro.textContent = res.msg || "Erro ao criar senha.";erro.style.display="block";}
        btnCriarSenha.innerHTML = "Criar senha e entrar";
      }
    });
  }

  if (estado.tela === "nova") {
    setTimeout(() => { renderNFs(); calcTotal(); }, 50);
  }
}

// ======= PWA =======
function mostrarBannerPWA() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone && !localStorage.getItem("pwaBannerVisto")) {
    const banner = document.createElement("div");
    banner.className = "ios-banner";
    banner.innerHTML = `
      <button class="close" onclick="this.parentElement.remove();localStorage.setItem('pwaBannerVisto','1')">×</button>
      <strong>Instalar no iPhone</strong>
      <p style="font-size:13px;margin-top:6px">Toque em <strong>Compartilhar ↑</strong> e depois <strong>Adicionar a Tela de Inicio</strong></p>`;
    document.body.appendChild(banner);
  }
}
