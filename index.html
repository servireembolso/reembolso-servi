<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}

.card{background:var(--bg);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}

body.light{
  --bg:#fff;--bg2:#f0f2f5;--bg3:#e8eaed;--border:#e0dfd8;--border2:#ccccc4;
  --text:#1a1a1a;--text2:#6b6b67;--text3:#9b9b97;
  --primary:#C0392B;--primary-lt:#FADBD8;
  --gbg:#E1F5EE;--gtx:#085041;--gbr:#5DCAA5;
  --bbg:#E6F1FB;--btx:#0C447C;--bbr:#85B7EB;
  --abg:#FFF7E6;--atx:#854F0B;--abr:#FAC775;
  --rbg:#FCEBEB;--rtx:#A32D2D;--rbr:#F09595;
  --obg:#FFF0E0;--otx:#7A3500;--obr:#FFAA60;
  background:#f0f2f5;color:#1a1a1a;
}
body.dark{
  --bg:#2a2a28;--bg2:#1a1a18;--bg3:#363634;--border:#4a4a48;--border2:#5e5e5c;
  --text:#e8e8e4;--text2:#b0b0ac;--text3:#787874;
  --primary:#E05040;--primary-lt:#3d1a18;
  --gbg:#0d3d2a;--gtx:#5DCAA5;--gbr:#0F6E56;
  --bbg:#0d2540;--btx:#85B7EB;--bbr:#185FA5;
  --abg:#3d2e00;--atx:#FAC775;--abr:#854F0B;
  --rbg:#3d0f0f;--rtx:#F09595;--rbr:#A32D2D;
  --obg:#3d1f00;--otx:#FFAA60;--obr:#7A3500;
  background:#1a1a18;color:#e8e8e4;
}
</style>
</head>
<body class="light">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const API="https://script.google.com/macros/s/AKfycbzYkvV52hLbcrf7TFrmDcUdeyXGAOyqTms8_9-RvUHFrg5SpOWs41-pys9Ds1tD0gWy/exec";
const LOGO="https://i.imgur.com/WtkBjp9.png";
const KM=0.96;
const CATS=["Alimentacao","Transporte","Hospedagem","Combustivel","Material de escritorio","Outro"];
const SC={
  "Rascunho":{bg:"var(--bg3)",tx:"var(--text2)",br:"var(--border2)"},
  "Pendente":{bg:"var(--abg)",tx:"var(--atx)",br:"var(--abr)"},
  "Aprovado Financeiro":{bg:"var(--bbg)",tx:"var(--btx)",br:"var(--bbr)"},
  "Aprovado Diretor Geral":{bg:"var(--gbg)",tx:"var(--gtx)",br:"var(--gbr)"},
  "Rejeitado":{bg:"var(--rbg)",tx:"var(--rtx)",br:"var(--rbr)"},
};
const nNF=()=>({id:Date.now()+Math.random(),cat:"",data:"",val:"",km:"",desc:"",outro:"",anexos:[],mapaNome:"",mapa:""});
const nForm=()=>({nome:"",dep:"",de:"",ate:"",pix:"",banco:"",desc:"",notas:[nNF()]});
const fmtData=d=>{if(!d)return"";try{const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString("pt-BR",{timeZone:"UTC"});}catch{return d;}};
const I=e=>({width:"100%",boxSizing:"border-box",padding:"11px 12px",fontSize:15,border:"1px solid "+(e?"#E24B4A":"var(--border2)"),borderRadius:10,background:"var(--bg)",color:"var(--text)",outline:"none"});
const L={fontSize:13,color:"var(--text2)",marginBottom:5,display:"block",fontWeight:500};
const G2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14};

function processarArquivo(file,cb){
  if(!file){cb(null,"");return;}
  const nome=file.name||"anexo";
  const isPDF=file.type==="application/pdf"||nome.toLowerCase().endsWith(".pdf");
  const reader=new FileReader();
  reader.onerror=()=>cb(null,"");
  reader.onload=ev=>{
    const result=ev.target.result;
    if(!result||result.length<50){cb(null,"");return;}
    if(isPDF){cb(result,nome);return;}
    const img=new Image();
    img.onerror=()=>cb(result,nome);
    img.onload=()=>{
      try{
        const MAX=1200;let w=img.width,h=img.height;
        if(w===0||h===0){cb(result,nome);return;}
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        cb(cv.toDataURL("image/jpeg",0.78),nome);
      }catch{cb(result,nome);}
    };
    img.src=result;
  };
  reader.readAsDataURL(file);
}

function AnexoBtn({label,icon,onFile,accept,capture}){
  const ref=useRef(null);
  const [proc,setProc]=useState(false);
  const handle=e=>{
    const f=e.target.files&&e.target.files[0];
    if(!f)return;
    setProc(true);
    processarArquivo(f,(b64,n)=>{
      setProc(false);
      if(b64)onFile(b64,n);
      else alert("Nao foi possivel processar. Tente outro arquivo.");
      if(ref.current)ref.current.value="";
    });
  };
  return <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"10px 8px",cursor:"pointer",gap:3,background:"var(--bg)",flex:1}}>
    <span style={{fontSize:20}}>{proc?"...":icon}</span>
    <span style={{fontSize:11,color:"var(--text2)",textAlign:"center"}}>{proc?"Processando...":label}</span>
    <input ref={ref} type="file" accept={accept} capture={capture} style={{display:"none"}} onChange={handle}/>
  </label>;
}

function NFCard({nf,idx,onUpd,onRem,showRem}){
  const isComb=nf.cat==="Combustivel";
  const isOutro=nf.cat==="Outro";
  const kmVal=isComb&&nf.km?((parseFloat(nf.km)||0)*KM).toFixed(2):"";
  const upd=(c,v)=>onUpd(idx,c,v);
  const adicionarAnexo=(b64,nome)=>upd("anexos",[...(nf.anexos||[]),{id:Date.now(),b64,nome}]);
  const removerAnexo=ai=>upd("anexos",(nf.anexos||[]).filter((_,i)=>i!==ai));
  return <div style={{background:"var(--bg3)",borderRadius:12,padding:14,marginBottom:12,border:"0.5px solid var(--border)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>NF {idx+1}</span>
      {showRem&&<button onClick={onRem} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"var(--text3)",padding:0}}>x</button>}
    </div>
    <div style={{marginBottom:12}}>
      <label style={L}>Categoria</label>
      <select style={I(false)} value={nf.cat} onChange={e=>upd("cat",e.target.value)}>
        <option value="">Selecione...</option>
        {CATS.map(c=><option key={c}>{c}</option>)}
      </select>
    </div>
    {nf.cat&&<>
      {isOutro&&<div style={{marginBottom:12}}>
        <label style={L}>Tipo de despesa</label>
        <input style={I(false)} value={nf.outro} onChange={e=>upd("outro",e.target.value)} placeholder="Ex: Curso, Ferramenta..."/>
      </div>}
      {isComb&&<div style={{background:"var(--obg)",border:"1px solid var(--obr)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"var(--otx)",fontWeight:500}}>
        Informe os KM - valor calculado automaticamente (x R$ {KM.toFixed(2)}/km)
      </div>}
      <div style={{...G2,marginBottom:12}}>
        <div><label style={L}>Data</label><input type="date" style={I(false)} value={nf.data} onChange={e=>upd("data",e.target.value)}/></div>
        {isComb
          ?<div><label style={L}>KM percorridos</label><input type="number" style={I(false)} value={nf.km} onChange={e=>upd("km",e.target.value)} placeholder="Ex: 120" min="0" step="0.1" inputMode="decimal"/></div>
          :<div><label style={L}>Valor (R$)</label><input type="number" style={I(false)} value={nf.val} onChange={e=>upd("val",e.target.value)} placeholder="0,00" min="0" step="0.01" inputMode="decimal"/></div>
        }
      </div>
      {isComb&&nf.km&&<div style={{fontSize:14,fontWeight:700,color:"var(--otx)",background:"var(--obg)",padding:"8px 12px",borderRadius:8,marginBottom:12}}>
        {nf.km} km x R$ {KM.toFixed(2)} = R$ {kmVal}
      </div>}
      <div style={{marginBottom:12}}>
        <label style={L}>Descricao</label>
        <input style={I(false)} value={nf.desc} onChange={e=>upd("desc",e.target.value)} placeholder="Ex: Almoco com cliente"/>
      </div>
      <div style={{marginBottom:isComb?12:0}}>
        <label style={L}>Anexos da NF ({(nf.anexos||[]).length} adicionado{(nf.anexos||[]).length!==1?"s":""})</label>
        <div style={{border:"1px dashed var(--border2)",borderRadius:10,overflow:"hidden",display:"flex",marginBottom:4}}>
          <AnexoBtn label="Camera" icon="📷" onFile={adicionarAnexo} accept="image/*" capture="environment"/>
          <div style={{width:"1px",background:"var(--border2)"}}/>
          <AnexoBtn label="Galeria/PDF" icon="🖼️" onFile={adicionarAnexo} accept="image/*,image/heic,image/heif,.pdf"/>
        </div>
        {(nf.anexos||[]).map((a,ai)=><div key={a.id} style={{padding:"6px 12px",fontSize:12,color:"var(--gtx)",background:"var(--gbg)",display:"flex",alignItems:"center",gap:6,borderRadius:8,marginBottom:4,border:"1px solid var(--gbr)"}}>
          <span>OK</span>
          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.nome}</span>
          <button onClick={()=>removerAnexo(ai)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--rtx)",fontSize:16,padding:0}}>x</button>
        </div>)}
      </div>
      {isComb&&<div>
        <label style={L}>Print do Google Maps (comprovante de rota)</label>
        <div style={{border:"1px dashed var(--border2)",borderRadius:10,overflow:"hidden",display:"flex"}}>
          <AnexoBtn label="Camera" icon="📷" onFile={(b,n)=>{upd("mapa",b);upd("mapaNome",n);}} accept="image/*" capture="environment"/>
          <div style={{width:"1px",background:"var(--border2)"}}/>
          <AnexoBtn label="Galeria" icon="🗺️" onFile={(b,n)=>{upd("mapa",b);upd("mapaNome",n);}} accept="image/*,image/heic,image/heif"/>
        </div>
        {nf.mapaNome&&<div style={{padding:"7px 12px",fontSize:12,color:"var(--gtx)",background:"var(--gbg)",display:"flex",alignItems:"center",gap:6,borderRadius:"0 0 10px 10px",border:"1px solid var(--gbr)",borderTop:"none"}}>
          <span>OK</span><span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nf.mapaNome}</span>
          <button onClick={()=>{upd("mapa","");upd("mapaNome","");}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--rtx)",fontSize:16,padding:0}}>x</button>
        </div>}
      </div>}
    </>}
  </div>;
}

function Hdr({tela,onBack,perfil,onSair,dark,onDark,onAjuda}){
  return <div style={{background:"var(--bg)",borderBottom:"0.5px solid var(--border)",padding:"10px 1rem",display:"flex",justifyContent:"space-between",alignItems:"center",minHeight:56,position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      {(tela==="form"||tela==="detalhe")&&<button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:"var(--text2)",padding:"0 4px 0 0"}}>&#8592;</button>}
      <img src={LOGO} alt="Logo" style={{height:28,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <button onClick={onAjuda} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:14,color:"var(--text)"}}>❓</button>
      <button onClick={onDark} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:14,color:"var(--text)"}}>{dark?"Dia":"Noite"}</button>
      {perfil&&<>
        <span className="badge" style={{background:"var(--primary-lt)",color:"var(--text)",border:"0.5px solid var(--primary)"}}>{perfil}</span>
        <button onClick={onSair} style={{fontSize:12,background:"none",border:"1px solid var(--border2)",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"var(--text2)"}}>Sair</button>
      </>}
    </div>
  </div>;
}

function Alerta({msg}){
  if(!msg)return null;
  const ok=msg.t==="ok";
  return <div style={{fontSize:13,padding:"10px 14px",borderRadius:10,background:ok?"var(--gbg)":"var(--rbg)",color:ok?"var(--gtx)":"var(--rtx)",border:"0.5px solid "+(ok?"var(--gbr)":"var(--rbr)"),marginBottom:14}}>{msg.m}</div>;
}

function App(){
  const [dark,setDark]=useState(()=>{try{const s=localStorage.getItem("theme");if(s)return s==="dark";}catch{}return window.matchMedia("(prefers-color-scheme:dark)").matches;});
  const [tela,setTela]=useState("login");
  const [usuario,setUsuario]=useState(null);
  const [perfil,setPerfil]=useState(null);
  const [emailL,setEmailL]=useState("");
  const [senha,setSenha]=useState("");
  const [novaSenha,setNovaSenha]=useState("");
  const [confSenha,setConfSenha]=useState("");
  const [showPwd,setShowPwd]=useState(false);
  const [perfilTmp,setPerfilTmp]=useState(null);
  const [sols,setSols]=useState([]);
  const [form,setForm]=useState(nForm());
  const [det,setDet]=useState(null);
  const [coment,setComent]=useState("");
  const [erros,setErros]=useState({});
  const [load,setLoad]=useState(false);
  const [msg,setMsg]=useState(null);
  const [telaAnterior,setTelaAnterior]=useState("lista");

  useEffect(()=>{document.body.className=dark?"dark":"light";try{localStorage.setItem("theme",dark?"dark":"light");}catch{};},[dark]);

  const apiCall=async body=>{
    const r=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(body)});
    return r.json();
  };

  const carregar=async(em,pf)=>{
    try{
      const d=await apiCall({type:"listar",email:em||usuario,perfil:pf||perfil});
      if(d.solicitacoes)setSols(d.solicitacoes||[]);
    }catch{}
  };

  const login=async()=>{
    if(!emailL.trim()||!senha.trim())return;
    setLoad(true);setMsg(null);
    try{
      const d=await apiCall({type:"login",email:emailL.trim().toLowerCase(),senha:senha.trim()});
      if(d.primeiroAcesso){setPerfilTmp(d.perfil);setTela("criarSenha");}
      else if(d.ok&&d.perfil){
        const em=emailL.trim().toLowerCase();
        setUsuario(em);setPerfil(d.perfil);
        await carregar(em,d.perfil);
        setTela("lista");
      }
      else setMsg({t:"err",m:d.msg||d.erro||"E-mail ou senha incorretos."});
    }catch{setMsg({t:"err",m:"Erro de conexao."});}
    setLoad(false);
  };

  const criarSenha=async()=>{
    if(!novaSenha.trim()||!confSenha.trim()){setMsg({t:"err",m:"Preencha os dois campos."});return;}
    if(novaSenha.length<6){setMsg({t:"err",m:"Minimo 6 caracteres."});return;}
    if(novaSenha!==confSenha){setMsg({t:"err",m:"As senhas nao coincidem."});return;}
    setLoad(true);setMsg(null);
    try{
      const d=await apiCall({type:"criarSenha",email:emailL.trim().toLowerCase(),senha:novaSenha.trim()});
      if(d.ok){
        const em=emailL.trim().toLowerCase();
        const pf=d.perfil||perfilTmp;
        setUsuario(em);setPerfil(pf);
        await carregar(em,pf);
        setTela("lista");
      }
      else setMsg({t:"err",m:d.msg||d.erro||"Erro ao criar senha."});
    }catch{setMsg({t:"err",m:"Erro de conexao."});}
    setLoad(false);
  };

  const updNota=(idx,c,v)=>setForm(f=>({...f,notas:f.notas.map((n,i)=>i===idx?{...n,[c]:v}:n)}));

  const total=form.notas.reduce((s,n)=>{
    if(n.cat==="Combustivel"&&n.km)return s+(parseFloat(n.km)||0)*KM;
    return s+(parseFloat(n.val)||0);
  },0);

  const validar=()=>{
    const e={};
    if(!form.nome.trim())e.nome=true;
    if(!form.dep.trim())e.dep=true;
    if(!form.de)e.de=true;
    if(!form.ate)e.ate=true;
    if(!form.pix.trim())e.pix=true;
    if(!form.banco.trim())e.banco=true;
    if(!form.desc.trim())e.desc=true;
    setErros(e);return Object.keys(e).length===0;
  };

  // SALVAR RASCUNHO (com anexos)
  const salvarRascunho=async()=>{
    if(!form.nome.trim()){setMsg({t:"err",m:"Preencha o nome para salvar rascunho."});return;}
    setLoad(true);setMsg(null);
    try{
      const notas=form.notas.map(n=>{
        let valor=n.val;
        let descricao=n.desc;
        if(n.cat==="Combustivel"&&n.km){
          valor=((parseFloat(n.km)||0)*KM).toFixed(2);
          descricao=n.km+"km x R$"+KM+"/km"+(n.desc?" - "+n.desc:"");
        } else if(n.cat==="Outro"&&n.outro){
          descricao="["+n.outro+"]"+(n.desc?" - "+n.desc:"");
        }
        return {
          data:n.data,descricao,cat:n.cat,valor,km:n.km||"",
          anexos:(n.anexos||[]).map(a=>({b64:a.b64,nome:a.nome})),
          mapa:n.mapa||"",nomeMapa:n.mapaNome||""
        };
      });
      const cats=[...new Set(notas.map(n=>n.cat).filter(Boolean))].join(", ");
      const total=form.notas.reduce((s,n)=>{
        if(n.cat==="Combustivel"&&n.km)return s+(parseFloat(n.km)||0)*KM;
        return s+(parseFloat(n.val)||0);
      },0);
      const d=await apiCall({
        type:"rascunho",nome:form.nome,email:usuario,
        departamento:form.dep,periodoInicio:form.de,periodoFim:form.ate,
        chavePix:form.pix,banco:form.banco,descricao:form.desc,
        categoria:cats,notas,valorTotal:total.toFixed(2)
      });
      if(d.ok){
        setMsg({t:"ok",m:"Rascunho salvo! ID: "+d.id});
        setForm(nForm());
        await carregar(usuario,perfil);
        setTela("lista");
      } else setMsg({t:"err",m:"Erro: "+(d.msg||"Tente novamente")});
    }catch(err){setMsg({t:"err",m:"Erro: "+err.message});}
    setLoad(false);
  };

  // EXCLUIR SOLICITACAO
  const excluir=async(id)=>{
    if(!window.confirm("Confirma a exclusao desta solicitacao?"))return;
    setLoad(true);
    try{
      const d=await apiCall({type:"excluir",id,email:usuario});
      if(d.ok){
        setMsg({t:"ok",m:"Solicitacao excluida."});
        await carregar(usuario,perfil);
        setTela("lista");
      } else setMsg({t:"err",m:d.msg||"Nao foi possivel excluir."});
    }catch(err){setMsg({t:"err",m:"Erro: "+err.message});}
    setLoad(false);
  };

  // ENVIO UNIFICADO — anexos embutidos nas notas, uma unica chamada
  const enviar=async()=>{
    if(!validar())return;
    setLoad(true);setMsg(null);
    try{
      const notas=form.notas.map(n=>{
        let valor=n.val;
        let descricao=n.desc;
        if(n.cat==="Combustivel"&&n.km){
          valor=((parseFloat(n.km)||0)*KM).toFixed(2);
          descricao=n.km+"km x R$"+KM+"/km"+(n.desc?" - "+n.desc:"");
        } else if(n.cat==="Outro"&&n.outro){
          descricao="["+n.outro+"]"+(n.desc?" - "+n.desc:"");
        }
        return {
          data:n.data,
          descricao:descricao,
          cat:n.cat,
          valor:valor,
          km:n.km||"",
          anexos:(n.anexos||[]).map(a=>({b64:a.b64,nome:a.nome})),
          mapa:n.mapa||"",
          nomeMapa:n.mapaNome||""
        };
      });

      const cats=[...new Set(notas.map(n=>n.cat).filter(Boolean))].join(", ");

      // Se e edicao de rascunho, primeiro atualiza depois envia

      };

      if(isEdicao){
        await apiCall({type:"excluir",id:form._editId,email:usuario});
      }

        setMsg({t:"ok",m:"Solicitacao enviada! ID: "+d.id});

        await carregar(usuario,perfil);
        setTela("lista");
      } else {
        setMsg({t:"err",m:"Erro: "+(d.msg||d.erro||"Tente novamente")});

      if(d.ok){
        setMsg({t:"ok",m:acao==="aprovar"?"Aprovado!":"Rejeitado."});
        setComent("");
        await carregar(usuario,perfil);
        setTela("lista");
      } else {

                    desc:n.Descricao_NF||"",outro:"",anexos:[],mapaNome:"",mapa:""
                  })):[nNF()],
                  _editId:sv.ID_Solicitacao
                });
                setTela("form");setMsg(null);
              }} style={{padding:13,borderRadius:10,border:"1px solid var(--bbr)",background:"var(--bbg)",color:"var(--btx)",cursor:"pointer",fontWeight:600,fontSize:14}}>✏️ Editar rascunho</button>}
              <button onClick={()=>excluir(sv.ID_Solicitacao)} disabled={load} style={{padding:13,borderRadius:10,border:"1px solid var(--rbr)",background:"var(--rbg)",color:"var(--rtx)",cursor:"pointer",fontWeight:600,fontSize:14}}>🗑️ Excluir</button>
            </div>
          </div>}

          {perfil==="Prestador"&&sv.Status==="Rascunho"&&<div className="card">
            <button onClick={async()=>{
              if(!window.confirm("Enviar esta solicitacao para aprovacao?"))return;
              setLoad(true);
              const d=await apiCall({type:"enviarRascunho",id:sv.ID_Solicitacao});
              if(d.ok){setMsg({t:"ok",m:"Enviado para aprovacao!"});await carregar(usuario,perfil);setTela("lista");}
              else setMsg({t:"err",m:d.msg||"Erro ao enviar."});
              setLoad(false);
            }} disabled={load} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:"var(--primary)",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:15}}>
              🚀 Enviar para aprovacao
            </button>
          </div>}

          {sv.Comentario_Gestor&&<div className="card" style={{borderLeft:"3px solid var(--bbr)",borderRadius:"0 14px 14px 0"}}>
            <p style={{fontSize:12,color:"var(--text2)",fontWeight:500}}>Comentario Financeiro</p>
            <p style={{fontSize:13,marginTop:4,color:"var(--text)"}}>{sv.Comentario_Gestor}</p>
          </div>}
          {sv.Comentario_RH&&<div className="card" style={{borderLeft:"3px solid var(--gbr)",borderRadius:"0 14px 14px 0"}}>
            <p style={{fontSize:12,color:"var(--text2)",fontWeight:500}}>Comentario Diretor Geral</p>
            <p style={{fontSize:13,marginTop:4,color:"var(--text)"}}>{sv.Comentario_RH}</p>
          </div>}

          {(pFinanceiro||pDiretor)&&<div className="card" style={{borderTop:"3px solid var(--primary)",borderRadius:"0 0 14px 14px"}}>
            <p style={{fontWeight:600,fontSize:15,marginBottom:12,color:"var(--text)"}}>{pFinanceiro?"Aprovacao Financeiro":"Aprovacao Diretor Geral"}</p>
            <textarea value={coment} onChange={e=>setComent(e.target.value)} placeholder="Comentario (opcional)..." rows={3} style={{...I(false),resize:"vertical",marginBottom:14}}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <button onClick={()=>aprovar(sv.ID_Solicitacao,"rejeitar")} disabled={load} style={{padding:14,borderRadius:10,border:"1px solid var(--rbr)",background:"var(--rbg)",color:"var(--rtx)",cursor:"pointer",fontWeight:600,fontSize:15}}>Rejeitar</button>
              <button onClick={()=>aprovar(sv.ID_Solicitacao,"aprovar")} disabled={load} style={{padding:14,borderRadius:10,border:"none",background:"var(--primary)",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:15}}>{load?"...":"Aprovar"}</button>
            </div>
          </div>}
        </div>;
      })()}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
